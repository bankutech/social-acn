services:
  - type: web
    name: social-acn-backend
    env: node
    region: ohio
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
    # Persistent disk for uploads (Requires Render Starter plan or above)
    # disk:
    #   name: uploads
    #   mountPath: /opt/render/project/src/backend/uploads
    #   sizeGB: 1
